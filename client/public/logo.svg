<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Squircle -->
  <rect x="25" y="25" width="150" height="150" rx="40" fill="url(#gradient)" filter="url(#shadow)"/>
  
  <!-- Stylized Lock Body -->
  <rect x="70" y="90" width="60" height="45" rx="8" fill="white"/>
  
  <!-- Stylized Lock Shackle -->
  <path d="M80 90V75C80 63.9543 88.9543 55 100 55C111.046 55 120 63.9543 120 75V90" stroke="white" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Keyhole detail -->
  <circle cx="100" cy="112" r="6" fill="url(#gradient)"/>
  <rect x="97" y="115" width="6" height="10" rx="3" fill="url(#gradient)"/>
</svg>
