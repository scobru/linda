services:
  linda-relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    container_name: linda-tpre-relay
    ports:
      - "8765:8765"
    volumes:
      - ./radata:/app/radata
    environment:
      - NODE_ENV=development
      - PORT=8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/"]
      interval: 30s
      timeout: 10s
      retries: 3
